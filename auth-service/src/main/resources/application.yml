server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/fintrack}
    username: ${POSTGRES_USER:fintrack}
    password: ${POSTGRES_PASSWORD:fintrack123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:clave-super-secreta-fintrack-2024-minimo-256-bits-requerido}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
